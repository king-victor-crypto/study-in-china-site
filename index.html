<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>来华留学一站式平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;}
header{background:#005bac;color:white;padding:15px 30px;}
.nav-top{display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:22px;font-weight:bold;}
.lang-switch a{color:white;margin-left:15px;text-decoration:none;}
.search-box{background:#f5f7fa;padding:40px;text-align:center;}
.search-box h2{margin-bottom:20px;color:#333;}
.search-input{width:60%;padding:12px 16px;font-size:16px;border:1px solid #ccc;border-radius:6px;}
.search-btn{padding:12px 24px;background:#005bac;color:white;border:none;border-radius:6px;margin-left:10px;cursor:pointer;}
.category{max-width:1200px;margin:50px auto;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:0 20px;}
.card{border:1px solid #eee;padding:30px;text-align:center;border-radius:8px;transition:0.3s;}
.card:hover{box-shadow:0 0 10px #ddd;}
.card h3{margin-bottom:10px;color:#005bac;}
</style>
</head>
<body>

<header>
  <div class="nav-top">
    <div class="logo">来华留学一站式平台</div>
    <div class="lang-switch">
      <a href="index.html">中文</a>
      <a href="en.html">English</a>
    </div>
  </div>
</header>

<section class="search-box">
  <h2>搜索中国大学 | 预科 / 本科 / 硕士 零基础可查</h2>
  <input type="text" class="search-input" placeholder="输入：零基础预科、便宜学费、非洲友好大学、计算机专业...">
  <button class="search-btn">立即搜索</button>
</section>

<section class="category">
  <div class="card">
    <h3>预科项目</h3>
    <p>零基础、无语言要求、国际生预科汇总</p>
  </div>
  <div class="card">
    <h3>本科留学</h3>
    <p>各校本科专业、学费、申请条件、奖学金</p>
  </div>
  <div class="card">
    <h3>硕士留学</h3>
    <p>硕博项目、导师信息、申请时间线</p>
  </div>
  <div class="card">
    <h3>院校大全</h3>
    <p>全国高校国际生招生库</p>
  </div>
  <div class="card">
    <h3>申请指南</h3>
    <p>材料、流程、签证、住宿全攻略</p>
  </div>
  <div class="card">
    <h3>留学生活</h3>
    <p>来华生活、常识、答疑</p>
  </div>
</section>

</body>
</html>
