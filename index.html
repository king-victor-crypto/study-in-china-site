// 切换逻辑
let langSel = document.getElementById("langSelect");
let defaultLang = localStorage.getItem("siteLang") || "zh";
langSel.value = defaultLang;

function changeLang(lang){
    localStorage.setItem("siteLang",lang);
    let data = langPack[lang];
    // 普通文字
    document.querySelectorAll("[data-key]").forEach(el=>{
        let k = el.getAttribute("data-key");
        el.innerText = data[k] || k;
    });
    // 占位符
    document.querySelectorAll("[data-placeholder]").forEach(el=>{
        let k = el.getAttribute("data-placeholder");
        el.placeholder = data[k] || "";
    });
}

langSel.onchange = function(){
    changeLang(this.value);
};

// 初始加载
changeLang(defaultLang);
