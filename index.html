<head>
    <meta charset="UTF-8">

    <title>Study in China | Global University Search</title>
    <style>
        :root {
            --main-color: #005bac;
            --text-dark: #202124;
            --text-gray: #666;
            --border-color: #eee;
            --card-bg: #fdfdfd;
            --space-sm: 12px;
            --space-md: 20px;
            --space-lg: 30px;
            --radius: 12px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-dark);
            line-height: 1.7;
            background: #fff;
        }

        /* 头部 */
        .header-container {
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid var(--border-color);
        }

        .header-inner {
            max-width: 1450px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-md);
        }

        .logo-brand {
            font-size: 24px;
            font-weight: 600;
            color: var(--main-color);
            white-space: nowrap;
        }

        .main-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            list-style: none;
        }

        .main-menu a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 15px;
            padding: 8px 12px;
            transition: color 0.25s, border-color 0.25s;
            min-height: var(--touch-target);
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        .main-menu a:hover,
        .main-menu a:focus-visible {
            color: var(--main-color);
            border-bottom-color: var(--main-color);
            outline: none;
        }

        .language-picker {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            min-height: var(--touch-target);
            background: white;
        }

        /* 搜索区 */
        .hero-search-area {
            max-width: 1180px;
            margin: 60px auto;
            padding: 0 var(--space-lg);
            text-align: center;
        }

        .hero-search-area h1 {
            font-size: 34px;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .hero-search-area p {
            color: var(--text-gray);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .search-form {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .main-search-input {
            flex: 1;
            min-width: 280px;
            max-width: 800px;
            padding: 18px 24px;
            border: 1px solid #ddd;
            border-radius: 14px;
            font-size: 17px;
            outline: none;
            transition: border-color 0.3s;
        }

        .main-search-input:focus {
            border-color: var(--main-color);
        }

        .search-btn {
            padding: 18px 28px;
            background: var(--main-color);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            min-height: var(--touch-target);
            white-space: nowrap;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #004489;
        }

        /* 筛选区域 */
        .filter-row {
            max-width: 1180px;
            margin: 0 auto 60px;
            padding: 0 var(--space-lg);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-md);
        }

        .filter-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
        }

        .filter-card summary {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            color: var(--main-color);
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: var(--touch-target);
        }

        .filter-card summary::-webkit-details-marker {
            display: none;
        }

        .filter-content {
            padding: 0 20px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-content select,
        .filter-content button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 7px;
            background: #fff;
            font-size: 14px;
        }

        .filter-content button {
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-content button.active {
            background: var(--main-color);
            color: #fff;
            border-color: var(--main-color);
        }

        /* 门户卡片 */
        .portal-card-section {
            max-width: 1180px;
            margin: 0 auto 80px;
            padding: 0 var(--space-lg);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: var(--space-md);
        }

        .portal-card {
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 28px 18px;
            text-align: center;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .portal-card:hover,
        .portal-card:focus-visible {
            box-shadow: 0 6px 18px rgba(0,91,172,0.1);
            transform: translateY(-3px);
            outline: none;
        }

        .portal-card h3 {
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .portal-card p {
            font-size: 13px;
            color: var(--text-gray);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .filter-row {
                grid-template-columns: 1fr;
            }
            .hero-search-area h1 {
                font-size: 26px;
            }
            .main-menu {
                display: none; /* 移动端隐藏导航，后续可扩展汉堡菜单 */
            }
        }
    </style>
</head>

// 支持语言列表
const supportLang = ['en','zh','es','fr','ar','ru','pt','id','th','vi','ja','ko','de','it','fa','tr','hi'];

// 读取本地缓存语言
function getCacheLang(){
    return localStorage.getItem('siteLang') || '';
}

// 自动获取浏览器系统语言
function getBrowserLang(){
    let bl = navigator.language.toLowerCase();
    for(let lang of supportLang){
        if(bl.startsWith(lang)) return lang;
    }
    return 'en';
}

// 全局切换语言
function setLanguage(lang){
    if(!langData[lang]) return;
    localStorage.setItem('siteLang', lang);
    document.getElementById('langSelect').value = lang;

    // 普通文本
    document.querySelectorAll('[data-lang]').forEach(el=>{
        let k = el.getAttribute('data-lang');
        el.innerText = langData[lang][k] || el.innerText;
    });
    // 输入框占位符
    document.querySelectorAll('[data-lang-placeholder]').forEach(el=>{
        let k = el.getAttribute('data-lang-placeholder');
        el.placeholder = langData[lang][k] || el.placeholder;
    });
    // 下拉选项
    document.querySelectorAll('[data-lang-opt]').forEach(el=>{
        let k = el.getAttribute('data-lang-opt');
        el.innerText = langData[lang][k] || el.innerText;
    });
}

// 语言选择器绑定
document.getElementById('langSelect').addEventListener('change', e=>{
    setLanguage(e.target.value);
});

// 页面初始化逻辑：缓存优先 → 系统语言兜底
window.onload = function(){
    let cache = getCacheLang();
    if(cache && supportLang.includes(cache)){
        setLanguage(cache);
    }else{
        setLanguage(getBrowserLang());
    }
};
</script>
