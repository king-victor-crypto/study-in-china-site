<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - Study in China</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff; --text: #202124; --muted: #5f6368;
            --border: #dadce0; --accent: #1a73e8; --hover: #f8f9fa; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .top-nav {
            background: #fff; border-bottom: 2px solid var(--border);
            padding: 14px 32px; display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 32px; }
        .nav-logo {
            font-size: 20px; font-weight: 700; color: var(--accent);
            text-decoration: none; display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .nav-logo i { font-size: 22px; }
        .nav-links { display: flex; gap: 8px; }
        .nav-links a {
            text-decoration: none; color: var(--text); font-size: 14px; font-weight: 500;
            padding: 8px 16px; border-radius: 20px; transition: all 0.2s; white-space: nowrap;
        }
        .nav-links a:hover { background: var(--hover); color: var(--accent); }
        .nav-links a.active { background: var(--accent); color: #fff; font-weight: 600; }

        .lang-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .lang-wrap select {
            border: 1px solid var(--border); border-radius: 16px;
            padding: 6px 12px; font-size: 13px; background: var(--bg); color: var(--text); cursor: pointer; outline: none;
        }

        .main-content {
            flex: 1; display: flex; max-width: 1100px; width: 100%;
            margin: 0 auto; padding: 1.5rem 32px 1rem; overflow-y: auto; gap: 24px;
        }

        /* 左侧详情 */
        .detail-left { flex: 1; display: flex; flex-direction: column; gap: 16px; }
        .detail-card {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px;
        }
        .detail-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
        .detail-card .uni-line {
            font-size: 14px; color: var(--muted); margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .detail-card .uni-line .rank { color: var(--accent); font-weight: 500; }
        .detail-card .tags-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .detail-card .tag {
            font-size: 12px; padding: 4px 10px; border-radius: 8px;
            background: #e8f0fe; color: var(--accent); font-weight: 500;
        }
        .detail-card .tag.orange { background: #fff3e0; color: #e65100; }
        .detail-card .tag.green { background: #e6f4ea; color: #1e8e3e; }
        .detail-card .tag.red { background: #fce8e6; color: #c5221f; }
        .detail-card p { font-size: 14px; line-height: 1.8; color: var(--text); }
        .detail-card h3 { font-size: 1rem; margin-bottom: 0.5rem; color: var(--accent); }

        /* 右侧信息栏 */
        .detail-right { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }
        .info-card {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px;
        }
        .info-card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; color: var(--accent); }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        .info-row:last-child { border-bottom: none; }
        .info-row .label { color: var(--muted); }
        .info-row .value { font-weight: 500; text-align: right; }
        .info-row .value.price { color: #e65100; font-weight: 600; font-size: 1.1rem; }
        .info-card .deadline-badge {
            background: #fef2f2; color: #dc2626; padding: 8px 12px;
            border-radius: 8px; font-size: 13px; font-weight: 600; text-align: center; margin-top: 8px;
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--accent); text-decoration: none; margin-bottom: 8px;
        }
        .back-link:hover { text-decoration: underline; }
        .btn-consult {
            display: block; width: 100%; padding: 12px; background: var(--accent);
            color: #fff; border: none; border-radius: 8px; font-size: 15px;
            font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; margin-top: 4px;
        }
        .btn-consult:hover { background: #1557b0; }

        .site-footer {
            text-align: center; padding: 10px 0; border-top: 1px solid var(--border);
            font-size: 11px; color: var(--muted); flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; padding: 1rem 16px; }
            .detail-right { width: 100%; }
            .top-nav { padding: 12px 16px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-left">
        <a href="index.html" class="nav-logo"><i class="fas fa-graduation-cap"></i> Study In China</a>
        <div class="nav-links">

    </div>
</nav>

<div class="main-content">

        <div class="detail-card">
            <h1 id="detailTitle"></h1>
            <div class="uni-line" id="detailUniLine"></div>
            <div class="tags-row" id="detailTags"></div>

        </div>
    </div>
    <div class="detail-right">
        <div class="info-card">

            <div class="info-row"><span class="label">学制</span><span class="value" id="infoDuration"></span></div>
            <div class="info-row"><span class="label">学位</span><span class="value" id="infoDegree"></span></div>
            <div class="info-row"><span class="label">学科门类</span><span class="value" id="infoCategory"></span></div>
            <div class="info-row"><span class="label">所属院系</span><span class="value" id="infoDept"></span></div>
            <div class="info-row"><span class="label">校区</span><span class="value" id="infoCampus"></span></div>
            <div class="info-row"><span class="label">GPA要求</span><span class="value" id="infoGPA"></span></div>
            <div class="info-row"><span class="label">清真食堂</span><span class="value" id="infoHalal"></span></div>
            <div class="info-row"><span class="label">校内宿舍</span><span class="value" id="infoDorm"></span></div>
            <div class="info-row"><span class="label">申请费</span><span class="value" id="infoFee"></span></div>
        </div>
        <div class="info-card">
            <h3>💰 费用与奖学金</h3>
            <div class="info-row"><span class="label">学费</span><span class="value price" id="infoTuition"></span></div>
            <div class="info-row"><span class="label">奖学金</span><span class="value" id="infoScholarship"></span></div>
            <div class="deadline-badge" id="infoDeadline"></div>
        </div>
        <a href="consult.html" class="btn-consult"><i class="fas fa-headset"></i> 咨询这个项目</a>
    </div>
</div>

<footer class="site-footer">© 2026 Study in China 来华留学一站式平台</footer>
