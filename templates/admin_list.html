<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} - 后台管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .admin-table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        .admin-table th { background: #f2f2f2; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 0.3rem 0.6rem; cursor: pointer; border-radius: 4px; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; margin-bottom: 1rem; }
    </style>
</head>
<body>
<header class="site-header">
    <div class="header-container">
        <div class="logo"><span>🔧 {{ title }}</span></div>
        <nav class="site-nav">
            <a href="/admin">← 返回后台首页</a>
        </nav>
    </div>
</header>
<section style="max-width:900px; margin:2rem auto;">
    <h2>{{ title }}</h2>
    <form method="post" action="/admin/{{ category }}/save">
        <table class="admin-table">
            <tr>
                <th>名称</th>
                <th>URL</th>
                <th>操作</th>
            </tr>
            {% for item in items %}
            <tr>
                <td><input type="text" name="name_{{ loop.index0 }}" value="{{ item.name }}" style="width:95%;"></td>
                <td><input type="text" name="url_{{ loop.index0 }}" value="{{ item.url }}" style="width:95%;"></td>
                <td><button type="button" class="btn-del" onclick="if(confirm('确认删除？')){ document.getElementById('del-form-{{ loop.index0 }}').submit(); }">删除</button></td>
            </tr>
            {% endfor %}
            <!-- 添加新行的空位 -->
            <tr>
                <td><input type="text" name="name_new" placeholder="新名称" style="width:95%;"></td>
                <td><input type="text" name="url_new" placeholder="新URL" style="width:95%;"></td>
                <td><button type="submit" class="btn-add">添加</button></td>
            </tr>
        </table>
        <button type="submit" style="margin-top:1rem; padding:0.5rem 1.5rem;">保存全部修改</button>
    </form>
    <!-- 删除用的隐藏表单 -->
    {% for item in items %}
    <form id="del-form-{{ loop.index0 }}" method="post" action="/admin/{{ category }}/delete/{{ loop.index0 }}" style="display:none;"></form>
    {% endfor %}
</section>
</body>
</html>
