<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学习与生活工具管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        fieldset { margin-bottom: 1.5rem; padding: 1rem; border: 1px solid #ccc; }
        legend { font-weight: bold; }
        .btn-del-cat { background: #e74c3c; color: white; border: none; padding: 0.2rem 0.5rem; cursor: pointer; border-radius: 4px; float: right; }
        .btn-add-cat { background: #27ae60; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; }
        textarea { width: 100%; }
    </style>
</head>
<body>
<header class="site-header">
    <div class="header-container">
        <div class="logo"><span>🔧 工具管理</span></div>
        <nav class="site-nav">
            <a href="/admin">← 返回后台首页</a>
        </nav>
    </div>
</header>
<section style="max-width:900px; margin:2rem auto;">
    <form method="post" action="/admin/tools/save">
        {% for cat in tools %}
        <fieldset>
            <legend>
                工具类别
                <button type="button" class="btn-del-cat" onclick="if(confirm('删除整个类别？')){ document.getElementById('del-cat-{{ loop.index0 }}').submit(); }">删除此类别</button>
            </legend>
            <input type="text" name="category_{{ loop.index0 }}" value="{{ cat.category }}" placeholder="类别名" style="width:200px;">
            <p>工具列表（格式：名称|URL，多个用分号分隔）</p>
            <textarea name="items_{{ loop.index0 }}" rows="3">{% for t in cat.items %}{{ t.name }}|{{ t.url }}{% if not loop.last %};{% endif %}{% endfor %}</textarea>
        </fieldset>
        {% endfor %}
        <!-- 添加新类别 -->
        <fieldset>
            <legend>添加新工具类别</legend>
            <input type="text" name="category_new" placeholder="新类别名" style="width:200px;">
            <p>工具列表（格式同上）</p>
            <textarea name="items_new" rows="3" placeholder="例如：工具名称|https://..."></textarea>
        </fieldset>
        <button type="submit">保存全部</button>
    </form>
    <!-- 删除类别的隐藏表单 -->
    {% for cat in tools %}
    <form id="del-cat-{{ loop.index0 }}" method="post" action="/admin/tools/delete/{{ loop.index0 }}" style="display:none;"></form>
    {% endfor %}
</section>
</body>
</html>
