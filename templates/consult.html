<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免费留学咨询 - Study in China</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo"><i class="fas fa-graduation-cap"></i> Study In China</div>
    <div class="nav-main">
        <a href="/">首页</a>
        <a href="/programs">发现项目</a>
        <a href="/schools">探索院校</a>
        <a href="/guide">申请指南</a>
        <a href="/life">留学中国</a>
        <a href="/resources">资源中心</a>
    </div>
</nav>

<div class="container" style="max-width:700px; margin:2rem auto;">
    <div id="formArea">
        <h1 style="text-align:center;"><i class="fas fa-comments"></i> 免费留学咨询</h1>
        <p style="text-align:center; color:var(--muted);">告诉我们你的情况，24小时内给你个性化选校建议</p>
        <form id="consultForm" class="form-card">
            <div class="form-row">
                <input type="text" name="name" placeholder="姓名 *" required>
                <input type="email" name="email" placeholder="邮箱 *" required>
            </div>
            <div class="form-row">
                <input type="text" name="phone" placeholder="电话/WhatsApp">
                <input type="text" name="nationality" placeholder="国籍 *" required>
            </div>
            <div class="form-row">
                <select name="current_education" required>
                    <option value="">当前学历</option>
                    <option>高中在读</option><option>高中毕业</option>
                    <option>本科在读</option><option>本科毕业</option>
                </select>
                <input type="text" name="gpa" placeholder="GPA/平均分">
            </div>
            <div class="form-row">
                <input type="text" name="language_level" placeholder="语言水平（HSK/雅思）">
                <input type="text" name="budget_range" placeholder="预算范围">
            </div>
            <div class="form-row">
                <input type="text" name="interested_major" placeholder="意向专业">
                <input type="text" name="interested_degree" placeholder="意向学位">
            </div>
            <textarea name="message" rows="3" placeholder="还想告诉我们什么？"></textarea>
            <input type="hidden" name="source_page" id="sourcePage">
            <button type="submit" class="btn-primary" style="width:100%; margin-top:1rem;">
                <i class="fas fa-paper-plane"></i> 提交 · 获取免费选校建议
            </button>
        </form>
    </div>
    <div id="successArea" style="display:none; text-align:center; padding:3rem;">
        <i class="fas fa-check-circle" style="font-size:3rem; color:#10b981;"></i>
        <h2>提交成功！</h2>
        <p>我们会在24小时内通过邮件联系你。</p>
    </div>
</div>

<footer>© 2026 Study in China Platform</footer>

<script>
document.getElementById('sourcePage').value = document.referrer || window.location.href;
document.getElementById('consultForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(this).entries());
    const resp = await fetch('/api/consult', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    if (resp.ok) {
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('successArea').style.display = 'block';
    } else {
        alert('提交失败，请稍后再试。');
    }
});
</script>
</body>
</html>
