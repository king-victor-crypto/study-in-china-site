<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申请资格评估 - Study in China</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff; --text: #202124; --muted: #5f6368;
            --border: #dadce0; --accent: #1a73e8; --hover: #f8f9fa; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .top-nav {
            background: #fff; border-bottom: 2px solid var(--border);
            padding: 14px 32px; display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 32px; }
        .nav-logo {
            font-size: 20px; font-weight: 700; color: var(--accent);
            text-decoration: none; display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .nav-logo i { font-size: 22px; }
        .nav-links { display: flex; gap: 8px; }
        .nav-links a {
            text-decoration: none; color: var(--text); font-size: 14px; font-weight: 500;
            padding: 8px 16px; border-radius: 20px; transition: all 0.2s; white-space: nowrap;
        }
        .nav-links a:hover { background: var(--hover); color: var(--accent); }
        .nav-links a.active { background: var(--accent); color: #fff; font-weight: 600; }
        .lang-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .lang-wrap select {
            border: 1px solid var(--border); border-radius: 16px;
            padding: 6px 12px; font-size: 13px; background: var(--bg); color: var(--text); cursor: pointer; outline: none;
        }

        .main-content {
            flex: 1; display: flex; flex-direction: column;
            max-width: 1000px; width: 100%; margin: 0 auto;
            padding: 1.5rem 32px 1rem; overflow-y: auto;
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--accent); text-decoration: none; margin-bottom: 1rem;
        }
        .back-link:hover { text-decoration: underline; }
        .page-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.3rem; }
        .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.2rem; }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        @media (max-width: 700px) { .modules-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .modules-grid { grid-template-columns: 1fr; } }

        .module-card {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px 18px;
            text-decoration: none; color: var(--text);
            transition: all 0.2s; display: flex; flex-direction: column; gap: 8px;
        }
        .module-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: var(--accent);
        }
        .module-card h3 { font-size: 0.95rem; font-weight: 600; }
        .module-card p { font-size: 12px; color: var(--muted); line-height: 1.5; }

        .site-footer {
            text-align: center; padding: 10px 0; border-top: 1px solid var(--border);
            font-size: 12px; color: var(--muted); flex-shrink: 0;
        }
    </style>
</head>
<body>
<nav class="top-nav">
    <div class="nav-left">
        <a href="index.html" class="nav-logo"><i class="fas fa-graduation-cap"></i> Study In China</a>
        <div class="nav-links">
            <a href="index.html">发现项目</a>
            <a href="schools.html">探索院校</a>
            <a href="guide.html" class="active">申请指南</a>
            <a href="life.html">留学中国</a>
            <a href="resource.html">资源中心</a>
        </div>
    </div>
    <div class="lang-wrap">
        <span style="font-size:13px;">🌐</span>
        <select id="langSelect">
            <option value="zh">中文</option><option value="en">English</option><option value="ar">العربية</option><option value="fr">Français</option><option value="es">Español</option><option value="ru">Русский</option><option value="pt">Português</option><option value="id">Bahasa Indonesia</option><option value="th">ไทย</option><option value="vi">Tiếng Việt</option><option value="ja">日本語</option><option value="ko">한국어</option><option value="de">Deutsch</option><option value="it">Italiano</option><option value="fa">فارسی</option><option value="tr">Türkçe</option><option value="hi">हिन्दी</option>
        </select>
    </div>
</nav>

<div class="main-content">
    <a href="guide.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回申请指南</a>
    <h1 class="page-title">申请资格评估</h1>
    <p class="page-sub">了解您需要满足的基本条件，确认申请资格</p>

    <!-- ========== 6 个子模块卡片 ========== -->
    <div class="modules-grid" id="modulesGrid"></div>
</div>

<footer class="site-footer">© 2026 Study in China Platform</footer>

<script>
    // ==================== 子模块数据 ====================
    // 🔧 修改方法：改 title 和 desc，链接到对应的详情页
    const modules = [
        { title:"学历背景要求", desc:"申请本科/硕士/博士，我需要具备什么学历？", file:"guide-detail-qualification-1.html" },
        { title:"护照与国籍规定", desc:"我的护照有效期够吗？我的国籍身份符合要求吗？", file:"guide-detail-qualification-2.html" },
        { title:"年龄与健康标准", desc:"申请留学有年龄限制吗？需要什么样的健康证明？", file:"guide-detail-qualification-3.html" },
        { title:"无犯罪记录证明", desc:"什么是无犯罪记录证明？我该如何办理？", file:"guide-detail-qualification-4.html" },
        { title:"语言能力门槛", desc:"中文授课/英文授课分别需要什么语言成绩？", file:"guide-detail-qualification-5.html" },
        { title:"特殊专业额外要求", desc:"艺术、医学等专业有没有特殊的申请要求？", file:"guide-detail-qualification-6.html" },
    ];

    const grid = document.getElementById('modulesGrid');
    modules.forEach(m => {
        const a = document.createElement('a');
        a.className = 'module-card';
        a.href = m.file;
        a.innerHTML = `<h3>${m.title}</h3><p>${m.desc}</p>`;
        grid.appendChild(a);
    });

    document.getElementById('langSelect').addEventListener('change', function() {
        localStorage.setItem('site_lang', this.value);
    });
</script>
</body>
</html>
