<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职业发展</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {background-color: #fff;}
        .page-header {background: #fff;color: #333;padding: 60px 0 40px;}
        .search-bar {padding: 0 0 40px;}
        .filter-section {background: #fff;border: none;padding: 0 0 40px;}
        .filter-row {display: flex;gap: 30px;justify-content: center;flex-wrap: wrap;margin-bottom: 30px;}
        .filter-group {text-align: center;}
        .filter-group h3 {font-size: 14px;color: #333;margin-bottom: 12px;font-weight: 500;}
        .filter-options {display: flex;gap: 10px;}
        .filter-select {border: 1px solid #eee;border-radius: 4px;padding: 8px 12px;font-size: 13px;}
        .lang-dropdown {position: relative;cursor: pointer;font-size: 14px;color: #333;padding: 4px 8px;border: 1px solid #eee;border-radius: 4px;background: #fff;}
        .lang-dropdown .lang-list {display: none;position: absolute;top: 100%;right: 0;background: #fff;border: 1px solid #eee;border-radius: 4px;padding: 8px 0;min-width: 120px;box-shadow: 0 2px 8px rgba(0,0,0,0.1);z-index: 100;}
        .lang-dropdown:hover .lang-list {display: block;}
        .lang-dropdown .lang-item {padding: 6px 12px;font-size: 13px;color: #333;}
        .lang-dropdown .lang-item:hover {background: #f5f5f5;}
    </style>
</head>
<body>
    <header class="site-header" style="background: #fff; border-bottom: 1px solid #eee;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo" style="color: #333;">Study in China</div>
            <nav class="top-nav">
                <a href="index.html">发现项目</a>
                <a href="schools.html">探索院校</a>
                <a href="guide.html">申请指南</a>
                <a href="life.html">留学中国生活</a>
                <a href="career.html" class="active">职业发展</a>
                <a href="resource.html">资源中心</a>
            </nav>
            <div class="lang-dropdown">
                中文 ▾
                <div class="lang-list">
                    <div class="lang-item">中文</div>
                    <div class="lang-item">English</div>
                    <div class="lang-item">Español</div>
                    <div class="lang-item">Français</div>
                    <div class="lang-item">Deutsch</div>
                    <div class="lang-item">Русский</div>
                    <div class="lang-item">العربية</div>
                    <div class="lang-item">日本語</div>
                    <div class="lang-item">한국어</div>
                    <div class="lang-item">Português</div>
                    <div class="lang-item">Italiano</div>
                    <div class="lang-item">Nederlands</div>
                    <div class="lang-item">Polski</div>
                    <div class="lang-item">Українська</div>
                    <div class="lang-item">Türkçe</div>
                    <div class="lang-item">ไทย</div>
                    <div class="lang-item">Việt Nam</div>
                </div>
            </div>
        </div>
    </header>

    <section class="page-header">
        <div class="container" style="text-align: center;">
            <h1 style="font-size: 28px; margin-bottom: 10px;">留学生职业发展</h1>
            <p style="color: #666; font-size: 15px;">校内兼职 · 校外实习 · 在华就业 · 创业政策 · 工作签证</p>
        </div>
    </section>

    <section class="search-bar">
        <div class="container" style="display: flex; justify-content: center; gap: 0;">
            <input type="text" placeholder="搜索实习、兼职、就业、创业、工作签证..." class="main-search" style="width: 500px; border: 1px solid #eee;">
            <button class="search-btn" style="border-radius: 0 6px 6px 0;">搜索</button>
        </div>
    </section>

    <section class="filter-section">
        <div class="container">
            <div class="filter-row">
                <div class="filter-group">
                    <h3>发展方向</h3>
                    <select class="filter-select">
                        <option>全部方向</option>
                        <option>校内兼职</option>
                        <option>校外实习</option>
                        <option>正式就业</option>
                        <option>自主创业</option>
                    </select>
                </div>
                <div class="filter-group">
                    <h3>证件政策</h3>
                    <select class="filter-select">
                        <option>全部政策</option>
                        <option>实习许可</option>
                        <option>工作签证</option>
                        <option>居留合规</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- 预留内容区域，后续数据库动态填充 -->
    <div style="max-width:1000px;margin:40px auto;text-align:center;color:#996;">
        内容预留区 · 后续对接数据自动展示
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('siteLang') || '中文';
            const langDropdown = document.querySelector('.lang-dropdown');
            langDropdown.textContent = savedLang + ' ▾';

            document.querySelectorAll('.lang-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const selectedLang = this.textContent;
                    localStorage.setItem('siteLang', selectedLang);
                    langDropdown.textContent = selectedLang + ' ▾';
                });
            });
        });
    </script>
</body>
</html>
