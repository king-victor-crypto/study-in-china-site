<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本科项目 - Study in China</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff; --text: #202124; --muted: #5f6368;
            --border: #dadce0; --accent: #1a73e8; --hover: #f8f9fa; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 顶部导航条 (极简) */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px; border-bottom: 1px solid var(--border); height: 56px; flex-shrink: 0;
        }
        .logo { font-size: 18px; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 6px; }
        .logo i { color: var(--accent); }
        .nav-links { display: flex; gap: 16px; }
        .nav-links a { text-decoration: none; color: var(--muted); font-size: 13px; transition: color 0.2s; }
        .nav-links a.active, .nav-links a:hover { color: var(--accent); font-weight: 500; }

        /* 主体 */
        .main-area { flex: 1; display: flex; flex-direction: column; max-width: 1200px; width: 100%; margin: 0 auto; padding: 1.5rem 24px; overflow-y: auto; }

        .section-header h2 { font-size: 1.4rem; font-weight: 600; }
        .section-header p { color: var(--muted); font-size: 14px; margin-top: 0.3rem; }

        .filter-bar { display: flex; gap: 12px; margin: 1.2rem 0; flex-wrap: wrap; }
        .filter-bar select, .filter-bar input {
            padding: 8px 14px; border: 1px solid var(--border); border-radius: 18px; font-size: 13px; outline: none;
            background: var(--bg); color: var(--text);
        }
        .filter-bar select:hover, .filter-bar input:hover { border-color: var(--accent); }

        /* 项目卡片列表 */
        .program-list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .program-item {
            background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; transition: all 0.2s; text-decoration: none; color: var(--text); display: flex; flex-direction: column; gap: 6px;
        }
        .program-item:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.06); border-color: var(--accent); }
        .program-title { font-size: 1.1rem; font-weight: 600; }
        .university-name { color: var(--muted); font-size: 0.9rem; }
        .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .tag {
            font-size: 0.8rem; background: #f1f3f4; color: var(--text); padding: 2px 10px; border-radius: 12px;
            white-space: nowrap;
        }
        .tag.highlight { background: #e6f4ea; color: #1e8e3e; }

        footer { text-align: center; padding: 12px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); flex-shrink: 0; }
    </style>
</head>
<body>

<header class="top-bar">
    <a href="index.html" class="logo"><i class="fas fa-graduation-cap"></i> Study In China</a>
    <div class="nav-links">
        <a href="index.html" class="active">发现项目</a>
        <a href="../schools/index.html">探索院校</a>
        <a href="../guide/index.html">申请指南</a>
        <a href="../life/index.html">留学中国</a>
        <a href="../resource.html">资源中心</a>
    </div>
</header>

<div class="main-area">
    <div class="section-header">
        <h2>本科项目</h2>
        <p>探索中国顶尖大学的学士学位课程</p>
    </div>

    <!-- 专属于“本科项目”的筛选器 -->
    <div class="filter-bar">
        <input type="text" placeholder="搜索专业，如：计算机科学...">
        <select>
            <option value="">全部城市</option>
            <option value="beijing">北京</option>
            <option value="shanghai">上海</option>
            <option value="hangzhou">杭州</option>
        </select>
        <select>
            <option value="">授课语言</option>
            <option value="chinese">中文</option>
            <option value="english">英文</option>
        </select>
        <select>
            <option value="">学费范围</option>
            <option value="low">< 2万/年</option>
            <option value="mid">2万 - 5万/年</option>
            <option value="high">> 5万/年</option>
        </select>
    </div>

    <!-- 本科项目列表（可由数据库动态生成） -->
    <div class="program-list-grid">
        <!-- 项目1 -->
        <a href="#" class="program-item">
            <h3 class="program-title">计算机科学与技术</h3>
            <p class="university-name">浙江大学 · 杭州</p>
            <p class="university-name">英文授课 | 4年 | ¥22,000/年</p>
            <div class="tags">
                <span class="tag">有奖学金</span>
                <span class="tag highlight">双一流</span>
            </div>
        </a>

        <!-- 项目2 -->
        <a href="#" class="program-item">
            <h3 class="program-title">国际商务</h3>
            <p class="university-name">复旦大学 · 上海</p>
            <p class="university-name">英文授课 | 4年 | ¥28,000/年</p>
            <div class="tags">
                <span class="tag">有奖学金</span>
                <span class="tag highlight">双一流</span>
                <span class="tag highlight">985</span>
            </div>
        </a>

        <!-- 项目3 -->
        <a href="#" class="program-item">
            <h3 class="program-title">临床医学 (M.B.B.S.)</h3>
            <p class="university-name">华中科技大学 · 武汉</p>
            <p class="university-name">英文授课 | 6年 | ¥30,000/年</p>
            <div class="tags">
                <span class="tag">有奖学金</span>
                <span class="tag">清真食堂</span>
                <span class="tag highlight">双一流</span>
                <span class="tag highlight">985</span>
            </div>
        </a>
    </div>
</div>

<footer>© 2026 Study in China Platform</footer>
</body>
</html>
