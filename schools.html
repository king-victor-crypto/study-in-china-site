<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study in China</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f5f5f7;
            color: #333;
        }
        .site-header {
            background: #ffffff;
            border-bottom: 1px solid #eee;
            padding: 16px 0;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .top-nav {
            display: flex;
            gap: 24px;
        }
        .top-nav a {
            text-decoration: none;
            color: #666;
            font-size: 15px;
            transition: 0.2s;
        }
        .top-nav a.active {
            color: #2563eb;
            font-weight: 500;
        }
        .top-nav a:hover {
            color: #2563eb;
        }
        #langSelect {
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .page-main {
            text-align: center;
            padding: 60px 20px;
        }
        .page-main h1 {
            font-size: 28px;
            color: #111;
            margin-bottom: 12px;
        }
        .page-main p {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
        }
        .search-box {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 40px;
        }
        .search-box input {
            width: 450px;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 6px 0 0 6px;
            font-size: 15px;
            outline: none;
        }
        .search-box button {
            padding: 12px 24px;
            background-color: #2563eb;
            color: #fff;
            border: none;
            border-radius: 0 6px 6px 0;
            font-size: 15px;
            cursor: pointer;
        }
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .filter-group {
            text-align: center;
        }
        .filter-group h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .filter-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="logo">Study in China</div>
            <nav class="top-nav">
                <!-- 默认中文兜底，data-key 供多语言切换 -->
                <a href="index.html" class="active" data-key="nav1">首页</a>
                <a href="schools.html" data-key="nav2">院校库</a>
                <a href="guide.html" data-key="nav3">申请指南</a>
                <a href="life.html" data-key="nav4">在华生活</a>
                <a href="career.html" data-key="nav5">职业发展</a>
                <a href="resource.html" data-key="nav6">资源下载</a>
            </nav>
            <select id="langSelect">
                <option value="zh">中文</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="ru">Русский</option>
                <option value="ar">العربية</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="pt">Português</option>
                <option value="it">Italiano</option>
                <option value="nl">Nederlands</option>
                <option value="pl">Polski</option>
                <option value="uk">Українська</option>
                <option value="tr">Türkçe</option>
                <option value="th">ไทย</option>
                <option value="vi">Việt Nam</option>
            </select>
        </div>
    </header>

    <main class="page-main">
        <h1 data-key="title">来华留学</h1>
        <p data-key="desc">探索中国高校，开启你的留学之旅</p>

        <div class="search-box">
            <input type="text" data-key-placeholder="searchTip" placeholder="搜索院校、专业或城市">
            <button data-key="searchBtn">搜索</button>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <h3 data-key="baseCond">学历层次</h3>
                <select>
                    <option data-key="eduLevel">全部学历</option>
                    <option data-key="eduLevel1">本科</option>
                    <option data-key="eduLevel2">硕士</option>
                    <option data-key="eduLevel3">博士</option>
                    <option data-key="eduLevel4">非学历进修</option>
                </select>
            </div>
            <div class="filter-group">
                <h3 data-key="langReq">语言要求</h3>
                <select>
                    <option data-key="langReq1">不限</option>
                    <option data-key="langReq2">中文授课</option>
                    <option data-key="langReq3">英文授课</option>
                    <option data-key="langReq4">中英双语</option>
                    <option data-key="langReq5">其他语种</option>
                </select>
            </div>
            <div class="filter-group">
                <h3 data-key="feeRange">费用范围</h3>
                <select>
                    <option data-key="feeRange1">全部</option>
                    <option data-key="feeRange2">1万以下/年</option>
                    <option data-key="feeRange3">1-3万/年</option>
                    <option data-key="feeRange4">3万以上/年</option>
                </select>
            </div>
            <div class="filter-group">
                <h3 data-key="cityArea">城市区域</h3>
                <select>
                    <option data-key="cityArea1">全部城市</option>
                    <option data-key="cityArea2">一线城市</option>
                    <option data-key="cityArea3">新一线及省会</option>
                </select>
            </div>
            <div class="filter-group">
                <h3 data-key="subject">学科门类</h3>
                <select>
                    <option data-key="subject1">全部学科</option>
                    <option data-key="subject2">工科</option>
                    <option data-key="subject3">商科</option>
                </select>
            </div>
        </div>
    </main>

    <!--
        多语言切换实现思路（后期添加 JS 时参考）：
        1. 用 JSON 对象存储17种语言翻译，key 对应各元素的 data-key 值
        2. 页面加载时读取用户偏好（localStorage 或浏览器语言），自动切换
        3. 监听 #langSelect change 事件，遍历所有 [data-key] 元素替换 textContent
        4. 对 [data-key-placeholder] 元素调用 setAttribute('placeholder', ...)
        5. 同步更新 <html lang=""> 属性
        6. 语言包可放在独立 JSON 文件中按需加载，避免首屏体积过大
    -->
</body>
</html>
